name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  BUILD_DIR: build

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent (Windows & macOS)
        if: runner.os != 'Linux'
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: fetchcontent-${{ runner.os }}-v2-${{ hashFiles('CMakeLists.txt') }}

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install freetype

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsfml-dev \
            nlohmann-json3-dev \
            catch2 \
            libfreetype-dev \
            libxrandr-dev \
            libudev-dev \
            libgl1-mesa-dev

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build ${{ env.BUILD_DIR }} --config Release --parallel -- /p:CL_MPCount=$env:NUMBER_OF_PROCESSORS

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build ${{ env.BUILD_DIR }} --config Release -j$(getconf _NPROCESSORS_ONLN)

      - name: Run tests
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          ctest --output-on-failure -C Release

      - name: Package (ZIP)
        run: |
          cpack --config ${{ env.BUILD_DIR }}/CPackConfig.cmake -G ZIP -B packages

      - name: Package (TGZ) — Linux & macOS
        if: runner.os != 'Windows'
        run: |
          cpack --config ${{ env.BUILD_DIR }}/CPackConfig.cmake -G TGZ -B packages

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ runner.os }}
          path: packages/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies + clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsfml-dev \
            nlohmann-json3-dev \
            catch2 \
            libfreetype-dev \
            clang-tidy

      - name: Configure with clang-tidy
        run: |
          cmake -B ${{ env.BUILD_DIR }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_CLANG_TIDY="clang-tidy;--warnings-as-errors=*"

      - name: Build (runs clang-tidy)
        run: |
          cmake --build ${{ env.BUILD_DIR }} -j$(nproc) 2>&1 | tee tidy.log
        continue-on-error: true

      - name: Upload analysis log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-log
          path: tidy.log

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies + coverage tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libsfml-dev \
            nlohmann-json3-dev \
            catch2 \
            libfreetype-dev \
            lcov \
            gcc

      - name: Configure with coverage flags
        run: |
          cmake -B ${{ env.BUILD_DIR }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -O0 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: |
          cmake --build ${{ env.BUILD_DIR }} -j$(nproc)

      - name: Run tests
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          ctest --output-on-failure -C Debug

      - name: Collect coverage
        run: |
          lcov --capture --directory ${{ env.BUILD_DIR }} \
            --output-file coverage.info \
            --rc geninfo_auto_base=1 \
            --ignore-errors inconsistent,mismatch
          lcov --remove coverage.info \
            '/usr/*' '*/_deps/*' '*/tests/*' \
            --output-file coverage.info \
            --ignore-errors inconsistent,mismatch
          lcov --list coverage.info

      - uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: packages
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Cupboards ${{ github.ref_name }}" \
            --notes "See [RELEASE.md](RELEASE.md) for details." \
            packages/*.zip packages/*.tar.gz
